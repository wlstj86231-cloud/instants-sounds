<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>인스턴트 사운드 - 밈 & 사운드보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #FDF6E3;
            color: #584B3A;
            font-family: 'VT323', monospace;
            -webkit-tap-highlight-color: transparent;
        }
        .sound-button-shadow {
            box-shadow: 4px 4px 0px #000000;
            border: 2px solid #000000;
        }
        .sound-button-shadow:active:not(:disabled) {
            box-shadow: 1px 1px 0px #000000;
            transform: translate(3px, 3px);
        }
        .sound-button-shadow:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            box-shadow: 2px 2px 0px #000000;
            transform: translate(1px, 1px);
        }
        .truncate {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-custom {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col overflow-x-hidden">

    <!-- Header -->
    <header class="bg-[#FDF6E3] border-b-2 border-black sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between gap-2 sm:gap-4">
            <div class="flex items-center gap-2 cursor-pointer shrink-0" onclick="resetSearch()">
                <div class="w-8 h-8 sm:w-10 sm:h-10 bg-[#DCCB98] border-2 border-black rounded-full flex items-center justify-center text-black shadow-[3px_3px_0px_#000000]">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10v3"/><path d="M6 6v11"/><path d="M10 3v18"/><path d="M14 8v7"/><path d="M18 5v13"/><path d="M22 10v3"/></svg>
                </div>
                <h1 class="text-xl sm:text-3xl tracking-tight hidden xs:block">인스턴트 사운드</h1>
            </div>

            <div class="flex-1 max-w-xl relative">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="검색..."
                    class="w-full pl-3 pr-3 py-1.5 text-lg bg-[#FDF6E3] border-2 border-black rounded-none focus:ring-0 focus:border-black transition-all outline-none"
                    oninput="handleSearch(this.value)"
                />
            </div>

            <div class="flex items-center gap-2 shrink-0">
                <button 
                    id="sortPopularBtn"
                    onclick="toggleSortPopular()"
                    class="p-1.5 sm:p-2 border-2 border-black bg-[#DCCB98] sound-button-shadow"
                    title="인기순 정렬"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
                </button>

                <button 
                    onclick="openUploadModal()"
                    class="flex items-center gap-1 sm:gap-2 px-2 sm:px-4 py-1.5 sm:py-2 bg-[#FF6B6B] text-black border-2 border-black sound-button-shadow font-medium"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                    <span class="hidden xs:inline">업로드</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Ad Area -->
    <div class="w-full max-w-7xl mx-auto px-4 py-4 bg-[#FDF6E3] border-b-2 border-black flex items-center justify-center h-32 sm:h-48">
        <p class="text-xl sm:text-2xl text-black opacity-50">AD AREA</p>
    </div>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto px-4 py-6 w-full">
        <div id="soundGrid" class="grid grid-cols-3 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-8 xl:grid-cols-10 gap-3">
            <div class="col-span-full text-center py-20 text-2xl">로딩 중...</div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-[#FDF6E3] border-t-2 border-black py-8">
        <div class="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-4 gap-8">
            <div class="col-span-1 md:col-span-2">
                <div class="relative flex items-center gap-2 mb-4 w-fit" onclick="handleAdminClick()">
                    <div class="w-8 h-8 bg-[#DCCB98] border-2 border-black rounded-full flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10v3"/><path d="M6 6v11"/><path d="M10 3v18"/><path d="M14 8v7"/><path d="M18 5v13"/><path d="M22 10v3"/></svg>
                    </div>
                    <span class="text-xl">인스턴트 사운드</span>
                </div>
                <p class="text-lg opacity-80">최고의 밈 사운드보드 아카이브</p>
            </div>
        </div>
        <div class="max-w-7xl mx-auto px-4 mt-8 pt-8 border-t-2 border-black text-center text-lg opacity-50">
            © <span id="currentYear"></span> 인스턴트 사운드.
        </div>
    </footer>

    <!-- Modals -->
    <div id="uploadModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-overlay">
        <div class="bg-[#FDF6E3] border-2 border-black w-full max-w-md shadow-[8px_8px_0px_#000000] p-6">
            <h2 class="text-3xl mb-6">사운드 업로드</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xl mb-1">제목</label>
                    <input type="text" id="uploadTitle" class="w-full px-3 py-2 bg-[#FDF6E3] border-2 border-black outline-none" placeholder="제목 입력">
                </div>
                <div>
                    <label class="block text-xl mb-1">파일 (오디오)</label>
                    <input type="file" id="uploadFile" accept="audio/*" class="w-full px-3 py-2 bg-[#FDF6E3] border-2 border-black outline-none">
                </div>
                <div id="uploadProgress" class="hidden w-full bg-gray-200 h-3 border-2 border-black">
                    <div id="progressBar" class="bg-black h-full w-0 transition-all"></div>
                </div>
                <div class="flex justify-end gap-2 mt-6">
                    <button onclick="closeUploadModal()" class="px-4 py-2 border-2 border-black sound-button-shadow bg-gray-200">취소</button>
                    <button id="uploadSubmitBtn" onclick="handleUpload()" class="px-4 py-2 border-2 border-black sound-button-shadow bg-[#FF6B6B]">업로드</button>
                </div>
            </div>
        </div>
    </div>

    <div id="adminModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 modal-overlay">
        <div class="bg-[#FDF6E3] border-2 border-black w-full max-w-sm shadow-[8px_8px_0px_#000000] p-6">
            <h2 class="text-2xl mb-4">관리자 인증</h2>
            <input type="password" id="adminCodeInput" placeholder="코드 입력" class="w-full px-3 py-2 text-lg bg-[#FDF6E3] border-2 border-black outline-none mb-4">
            <div class="flex justify-end gap-2">
                <button onclick="closeAdminModal()" class="px-4 py-2 border-2 border-black sound-button-shadow bg-gray-200">취소</button>
                <button onclick="verifyAdmin()" class="px-4 py-2 border-2 border-black sound-button-shadow bg-[#FF6B6B]">확인</button>
            </div>
        </div>
    </div>

    <div id="alertModal" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-4 modal-overlay">
        <div class="bg-[#FDF6E3] border-2 border-black w-full max-w-sm shadow-[8px_8px_0px_#000000] p-6">
            <h2 class="text-2xl mb-4">알림</h2>
            <p id="alertMessage" class="text-lg mb-6"></p>
            <div class="flex justify-end">
                <button onclick="closeAlert()" class="px-4 py-2 border-2 border-black sound-button-shadow bg-[#DCCB98]">확인</button>
            </div>
        </div>
    </div>

    <div id="confirmModal" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-4 modal-overlay">
        <div class="bg-[#FDF6E3] border-2 border-black w-full max-w-sm shadow-[8px_8px_0px_#000000] p-6">
            <h2 class="text-2xl mb-4">확인</h2>
            <p id="confirmMessage" class="text-lg mb-6"></p>
            <div class="flex justify-end gap-2">
                <button onclick="closeConfirm(false)" class="px-4 py-2 border-2 border-black sound-button-shadow bg-gray-200">취소</button>
                <button onclick="closeConfirm(true)" class="px-4 py-2 border-2 border-black sound-button-shadow bg-[#FF6B6B]">확인</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, updateDoc, doc, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBX6VuB9dxCeUymmJeyIqIQtSIbo2bKw-w",
            authDomain: "instants-sounds.firebaseapp.com",
            projectId: "instants-sounds",
            storageBucket: "instants-sounds.firebasestorage.app",
            messagingSenderId: "364087878036",
            appId: "1:364087878036:web:36f9ce7005dd4eec9a6f81"
        };

        let app, db, storage;
        try {
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            storage = getStorage(app);
        } catch (e) { console.error(e); }

        let sounds = [];
        let filteredSounds = [];
        let isPopularSort = false;
        let isAdmin = false;
        let adminClickCount = 0;
        let currentAudio = null;
        let currentPlayingId = null;
        let loadingId = null;
        let confirmCallback = null;

        const getEl = (id) => document.getElementById(id);

        window.init = () => {
            const yearSpan = getEl('currentYear');
            if (yearSpan) yearSpan.textContent = new Date().getFullYear();
            loadSounds();
        };

        async function loadSounds() {
            const grid = getEl('soundGrid');
            if (!db || !grid) return;
            grid.innerHTML = '<div class="col-span-full text-center py-20 text-2xl">로딩 중...</div>';
            try {
                let q = query(collection(db, "sounds"), orderBy(isPopularSort ? "playCount" : "createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                sounds = [];
                querySnapshot.forEach((doc) => {
                    sounds.push({ id: doc.id, ...doc.data() });
                });
                applyFilter();
            } catch (error) {
                console.error(error);
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-2xl">데이터 로드 실패</div>';
            }
        }

        window.handleSearch = () => applyFilter();
        window.resetSearch = () => {
            const input = getEl('searchInput');
            if (input) input.value = '';
            applyFilter();
        };

        window.toggleSortPopular = () => {
            isPopularSort = !isPopularSort;
            const btn = getEl('sortPopularBtn');
            if (btn) btn.classList.toggle('bg-[#FFD700]', isPopularSort);
            loadSounds();
        };

        function applyFilter() {
            const input = getEl('searchInput');
            const term = input ? input.value.toLowerCase() : '';
            filteredSounds = sounds.filter(s => s.title.toLowerCase().includes(term));
            renderSounds();
        }

        function renderSounds() {
            const grid = getEl('soundGrid');
            if (!grid) return;
            if (filteredSounds.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-2xl opacity-50">검색 결과 없음</div>';
                return;
            }

            grid.innerHTML = filteredSounds.map(sound => {
                const isPlaying = currentPlayingId === sound.id;
                const isLoading = loadingId === sound.id;
                
                return `
                <div class="flex flex-col items-center">
                    <button
                        onclick="playSound('${sound.url}', '${sound.id}')"
                        class="relative w-full aspect-square flex items-center justify-center transition-all bg-[#DCCB98] sound-button-shadow ${isPlaying ? 'bg-[#FFD700]' : ''}"
                        ${isLoading ? 'disabled' : ''}
                    >
                        ${isLoading ? 
                            '<svg class="animate-spin-custom" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>' : 
                            (isPlaying ? 
                                '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>' : 
                                '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>')
                        }
                    </button>
                    <div class="mt-2 text-center w-full">
                        <h3 class="text-lg font-normal text-black truncate px-1" title="${sound.title}">${sound.title}</h3>
                        <div class="flex justify-center gap-1 mt-1">
                            <button onclick="downloadSound(this, '${sound.url}', '${sound.title}')" class="p-1 bg-[#A9A9A9] border-2 border-black sound-button-shadow" title="다운로드">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                            </button>
                            <button onclick="shareSound(this, '${sound.title}', '${sound.url}')" class="p-1 bg-[#A9A9A9] border-2 border-black sound-button-shadow" title="공유">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" x2="12" y1="2" y2="15"/></svg>
                            </button>
                            ${isAdmin ? `<button onclick="deleteSound('${sound.id}', '${sound.storagePath}')" class="p-1 bg-[#FF6B6B] border-2 border-black sound-button-shadow"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg></button>` : ''}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        window.playSound = async (url, id) => {
            if (loadingId) return;
            
            if (currentAudio && currentPlayingId === id) {
                if (!currentAudio.paused) {
                    currentAudio.pause();
                    currentPlayingId = null;
                    renderSounds();
                    return;
                }
            }

            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }

            loadingId = id;
            renderSounds();

            try {
                currentAudio = new Audio();
                currentAudio.src = url;
                currentAudio.preload = "auto";
                
                await currentAudio.play();
                currentPlayingId = id;
                loadingId = null;
                renderSounds();

                currentAudio.onended = () => {
                    currentPlayingId = null;
                    renderSounds();
                };
                
                updateDoc(doc(db, "sounds", id), { playCount: increment(1) });
            } catch (e) {
                console.error(e);
                loadingId = null;
                renderSounds();
            }
        };

        window.downloadSound = async (btn, url, title) => {
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<svg class="animate-spin-custom" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>';
            
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `${title}.mp3`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);
            } catch (e) {
                window.open(url, '_blank');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHTML;
            }
        };

        window.shareSound = async (btn, title, url) => {
            if (navigator.share) {
                try {
                    await navigator.share({ title, text: `${title} 사운드!`, url });
                } catch (e) {}
            } else {
                navigator.clipboard.writeText(url).then(() => showAlert("링크 복사 완료!"));
            }
        };

        window.handleAdminClick = () => {
            adminClickCount++;
            if (adminClickCount >= 5) {
                getEl('adminModal').classList.remove('hidden');
                adminClickCount = 0;
            }
        };

        window.closeAdminModal = () => {
            getEl('adminModal').classList.add('hidden');
            getEl('adminCodeInput').value = '';
        };

        window.verifyAdmin = () => {
            if (getEl('adminCodeInput').value === "021017") {
                isAdmin = true;
                closeAdminModal();
                renderSounds();
            } else {
                showAlert("코드 불일치");
            }
        };

        window.deleteSound = (id, storagePath) => {
            showConfirm("삭제하시겠습니까?", async () => {
                try {
                    await deleteDoc(doc(db, "sounds", id));
                    if (storagePath) await deleteObject(ref(storage, storagePath));
                    loadSounds();
                } catch (e) { showAlert("삭제 실패"); }
            });
        };

        window.openUploadModal = () => getEl('uploadModal').classList.remove('hidden');
        window.closeUploadModal = () => {
            getEl('uploadModal').classList.add('hidden');
            getEl('uploadTitle').value = '';
            getEl('uploadFile').value = '';
            getEl('uploadProgress').classList.add('hidden');
        };

        window.handleUpload = async () => {
            const title = getEl('uploadTitle').value.trim();
            const file = getEl('uploadFile').files[0];
            if (!title || !file) return showAlert("입력 확인");

            const btn = getEl('uploadSubmitBtn');
            btn.disabled = true;
            btn.textContent = "처리 중...";
            getEl('uploadProgress').classList.remove('hidden');

            try {
                const path = `sounds/${Date.now()}_${file.name.replace(/[^a-z0-9.]/gi, '_')}`;
                const storageRef = ref(storage, path);
                const uploadTask = uploadBytesResumable(storageRef, file);

                uploadTask.on('state_changed', 
                    (s) => getEl('progressBar').style.width = (s.bytesTransferred / s.totalBytes) * 100 + '%',
                    (e) => { showAlert("업로드 실패"); btn.disabled = false; btn.textContent = "업로드"; },
                    async () => {
                        const url = await getDownloadURL(uploadTask.snapshot.ref);
                        await addDoc(collection(db, "sounds"), { title, url, storagePath: path, playCount: 0, createdAt: new Date().toISOString() });
                        closeUploadModal();
                        loadSounds();
                        btn.disabled = false;
                        btn.textContent = "업로드";
                    }
                );
            } catch (e) { btn.disabled = false; btn.textContent = "업로드"; }
        };

        window.showAlert = (msg) => {
            getEl('alertMessage').textContent = msg;
            getEl('alertModal').classList.remove('hidden');
        };
        window.closeAlert = () => getEl('alertModal').classList.add('hidden');
        window.showConfirm = (msg, cb) => {
            getEl('confirmMessage').textContent = msg;
            getEl('confirmModal').classList.remove('hidden');
            confirmCallback = cb;
        };
        window.closeConfirm = (res) => {
            getEl('confirmModal').classList.add('hidden');
            if (res && confirmCallback) confirmCallback();
        };

        init();
    </script>
</body>
</html>
